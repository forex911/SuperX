<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Enhancement</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Upload Image</h1>
        <p>Any Size, 4× Enhancement</p>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- Upload Form -->
    <div class="upload-form">
        <form id="upload-form" action="/enhance" method="post" enctype="multipart/form-data">

            <!-- Custom File Upload -->
            <div class="mb-3">
                <label class="custom-file-upload">
                    <input type="file" id="file" name="file" accept=".jpg,.jpeg,.png" required>
                    <span id="file-text">Drop image here or click to upload</span>
                </label>
            </div>

            <!-- Image Preview -->
            <div class="preview-container">
                <img id="image-preview" src="#" alt="Image Preview">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary w-100 mt-3">
                Enhance Image
            </button>
        </form>

        <!-- Loading Spinner -->
        <div class="d-flex justify-content-center mt-3">
            <div class="spinner-border text-primary" id="loading-spinner" role="status" style="display:none;">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript -->
<script>
const fileInput = document.getElementById("file");
const fileText = document.getElementById("file-text");
const uploadBox = document.querySelector(".custom-file-upload");
const previewImage = document.getElementById("image-preview");

// Show preview & filename
fileInput.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    fileText.textContent = file.name;
    uploadBox.classList.add("active");

    const reader = new FileReader();
    reader.onload = function (e) {
        previewImage.src = e.target.result;
        previewImage.style.display = "block";
    };
    reader.readAsDataURL(file);
});

// Show loading spinner on submit
document.getElementById("upload-form").addEventListener("submit", function () {
    document.getElementById("loading-spinner").style.display = "block";
});
</script>

</body>
</html>
