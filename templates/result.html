<!DOCTYPE html>
<html>
<head>
    <title>Image Enhanced</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='result.css') }}">
</head>
<body>
    <h1>Image Enhancement Results</h1>
    
    <div class="images">
        <div class="image-container">
            <h2>Original</h2>
            <img src="{{ original_url }}" alt="Original image">
            <p><a href="{{ original_url }}" download>Download original</a></p>
        </div>

        <div class="image-container">
            <h2>Enhanced</h2>
            <img src="{{ enhanced_url }}" alt="Enhanced image">
            <p><a href="{{ enhanced_url }}" download>Download enhanced</a></p>
            <p><a href="/direct-result/{{ enhanced }}" target="_blank">View enhanced image directly</a></p>
        </div>
    </div>
    
    <a href="/" class="process-again-btn">Process another image</a>

</body>
</html>
